<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dholera Smart City Plan Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Make the map take up the full screen */
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 3. Initialize the map centered on Dholera, Gujarat
        // Coordinates for Dholera: ~ 22.248 Latitude, 72.195 Longitude
        const map = L.map('map').setView([22.248, 72.195], 11);

        // 4. Add the OpenStreetMap base layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 5. Add the Dholera Smart City Plan Image Overlay
        // REPLACE THIS with a link to your high-resolution Dholera Master Plan PNG/JPG
        // Tip: Use a PNG with a transparent background for the best look!
        const imageUrl = 'public/dholera-plan.png'; // Placeholder

        // 6. Define the geographical boundaries of your image
        // You must align these with the corners of the real Dholera SIR map.
        // Format: [[Top-Left Latitude, Top-Left Longitude], [Bottom-Right Lat, Bottom-Right Lon]]
        const imageBounds = [
            [22.380, 72.050], // Approximate North-West boundary
            [22.100, 72.350]  // Approximate South-East boundary
        ];

        // 7. Overlay the image onto the map
        const dholeraPlanLayer = L.imageOverlay(imageUrl, imageBounds, {
            opacity: 0.7,      // 0.7 means 70% visible, so you can see the real streets underneath
            interactive: true  // Set to true if you want to add click events later
        }).addTo(map);

        // Optional: Make the map automatically zoom to fit the exact boundaries of your image overlay
        map.fitBounds(imageBounds);

    </script>
</body>
</html>
