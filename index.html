<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dholera SIR — Focused Master Plan Image</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #040d1a;
    --border: #0e2a4a;
    --accent: #00c8ff;
    --accent2: #00ff9d;
    --text: #cde4f5;
    --muted: #4a7a9b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    font-family: 'Exo 2', sans-serif;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER (kept for branding) */
  header {
    background: linear-gradient(90deg, #040d1a 0%, #071e3d 50%, #040d1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 1000;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent), transparent);
    opacity: 0.6;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    border: 2px solid var(--accent);
    border-radius: 6px;
    display: grid;
    place-items: center;
    position: relative;
    overflow: hidden;
  }
  .logo-icon::before {
    content: '⬡';
    font-size: 22px;
    color: var(--accent);
    line-height: 1;
  }
  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
  }
  .logo-text span { color: var(--accent); }
  .logo-sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .header-tags {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .tag-green { background: rgba(0,255,157,0.1); border: 1px solid var(--accent2); color: var(--accent2); }
  .tag-blue  { background: rgba(0,200,255,0.1); border: 1px solid var(--accent); color: var(--accent); }
  .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(0.85)} }

  /* MAIN LAYOUT (simplified, no sidebar) */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* MAP CONTAINER */
  .map-wrapper {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  #map {
    flex: 1;
    background: #0a1628;
  }

  /* Leaflet overrides */
  .leaflet-control-zoom {
    border: 1px solid var(--border) !important;
    border-radius: 4px !important;
    overflow: hidden;
  }
  .leaflet-control-zoom a {
    background: #07152a !important; /* Panel color */
    color: var(--accent) !important;
    border-color: var(--border) !important;
    font-size: 16px !important;
  }
  .leaflet-control-zoom a:hover { background: var(--border) !important; }
  .leaflet-control-attribution {
    background: rgba(4,13,26,0.85) !important;
    color: var(--muted) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--accent) !important; }

  /* COORDINATES BAR */
  .coords-bar {
    position: absolute;
    bottom: 0;
    right: 0;
    background: rgba(4,13,26,0.9);
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
    padding: 4px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    z-index: 1000;
    pointer-events: none;
  }
  .coords-bar span { color: var(--accent2); }

</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <div>
      <div class="logo-text">Dholera <span>SIR</span></div>
      <div class="logo-sub">Master Plan Image Overlay</div>
    </div>
  </div>
  <div class="header-tags">
    <div class="pulse-dot"></div>
    <div class="tag tag-green">Focused Image Layer</div>
    <div class="tag tag-blue">Gujarat, India</div>
  </div>
</header>

<div class="main">
  <div class="map-wrapper">
    <div id="map"></div>
    <div class="coords-bar" id="coords">Lat: — &nbsp; Lng: —</div>
  </div>
</div>

<script>
// ---- DHOLERA APPROXIMATE COORDINATES ----
// Center ~22.25°N, 72.18°E

// --- MAP INIT ---
const map = L.map('map', {
  center: [22.25, 72.18],
  zoom: 11,
  zoomControl: true
});

// Single default base tile layer (Dark Mode for aesthetics)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19
}).addTo(map);


// ==========================================
// MASTER PLAN IMAGE LAYER (Simplified & Focused)
// ==========================================
// 1. **CRITICAL:** Set YOUR precise image bounds (Top-Left corner, Bottom-Right corner)
// Replace these placeholders with the coordinates for YOUR image's corners!
const imageBounds = [
    [22.60, 71.80], // Placeholder Top-Left corner
    [21.90, 72.65]  // Placeholder Bottom-Right corner
];

// 2. Add image overlay with 50% transparency, visible by default
L.imageOverlay('public/dholera-plan.png', imageBounds, {
    opacity: 0.5,       // 50% transparency
    interactive: false  // Keep as static overlay, non-clickable
}).addTo(map);

// Fit map view to the image bounds for immediate focus
map.fitBounds(imageBounds);
// ==========================================


// ---- COORDINATES DISPLAY ----
map.on('mousemove', (e) => {
  document.getElementById('coords').innerHTML =
    `Lat: <span>${e.latlng.lat.toFixed(4)}</span> &nbsp; Lng: <span>${e.latlng.lng.toFixed(4)}</span>`;
});
</script>
</body>
</html>
