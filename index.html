<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dholera Smart City Plan</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize the map
        const map = L.map('map').setView([22.248, 72.195], 11);

        // 2. Add OpenStreetMap base layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. The updated path to your image in the public folder
        const imageUrl = 'public/dholera-plan.png'; 

        // 4. Image boundary coordinates (You will tweak these!)
        const imageBounds = [
            [22.380, 72.050], // Top-Left corner
            [22.100, 72.350]  // Bottom-Right corner
        ];

        // 5. Add the image to the map
        L.imageOverlay(imageUrl, imageBounds, {
            opacity: 0.7, // 70% opacity so you can see roads underneath
            interactive: true 
        }).addTo(map);

        map.fitBounds(imageBounds);

        // ==========================================
        // CALIBRATION HELPER TOOL
        // Click anywhere on the map to see the coordinates!
        // ==========================================
        map.on('click', function(e) {
            const lat = e.latlng.lat.toFixed(4);
            const lng = e.latlng.lng.toFixed(4);
            
            L.popup()
                .setLatLng(e.latlng)
                .setContent(`<b>Coordinates:</b><br>[${lat}, ${lng}]<br><br><i>Use these to update your imageBounds!</i>`)
                .openOn(map);
        });

    </script>
</body>
</html>
